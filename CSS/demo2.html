<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login UI</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3efe7;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        width: 900px;
        height: 520px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0px 10px 40px rgba(0,0,0,0.2);
        border: 3px solid #0f4c3a;
    }

    /* LEFT SIDE */
    .left {
        width: 50%;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .logo {
        font-weight: bold;
        margin-bottom: 20px;
        color: #0f4c3a;
    }

    h2 {
        margin: 0;
        color: #2c2c54;
    }

    p {
        font-size: 14px;
        color: gray;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    .row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin: 10px 0;
    }

    .row a {
        text-decoration: none;
        color: red;
    }

    .buttons {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    .login-btn {
        flex: 1;
        padding: 12px;
        background: #0f4c3a;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    .create-btn {
        flex: 1;
        padding: 12px;
        background: white;
        border: 2px solid #0f4c3a;
        border-radius: 8px;
        cursor: pointer;
    }

    .footer {
        font-size: 10px;
        color: gray;
        margin-top: 30px;
    }

    /* RIGHT SIDE */
    .right {
        width: 50%;
        position: relative;
    }

    .right img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: gold;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="container">
    
    <!-- LEFT -->
    <div class="left">
        <div class="logo">Kafh</div>

        <h2>Welcome Back!</h2>
        <p>Please Log in to your account.</p>

        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">

        <div class="row">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>

        <div class="buttons">
            <button class="login-btn">Login</button>
            <button class="create-btn">Create account</button>
        </div>

        <div class="footer">
            By sign up you agree to our terms and privacy policy
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <img src="https://images.unsplash.com/photo-1598755257130-c2aaca1f061c" alt="bird">
        <div class="play-btn">▶</div>
    </div>

</div>

</body>
</html>
