<!-- list
we are having 3 types of lists
1. Un ordered      we are going to provide symbolls using type attribute  (DISC, Square, Circle, None)   ul
2. Ordered         We provide a sequence using type attribute (a, A, 1, I, i)                            ol
3. discriptive     Which carries dd (discriptive data) dt (discriptive term) dl(discriptive list)        dl
li is list item

-->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <ul type="None">
        <li>Doraemon</li>
        <li>Schinchan</li>
        <li>Ninja Hattori</li>
        <li>Tom & Jerry</li>
        <li> Ben 10</li>
        <li>Power rangers</li>
    </ul>

    <ol type="1">
        <li>carrot</li>
        <li>potato</li>
        <li>onion</li>
        <li>garlic</li>
        <li>ginger</li>
    </ol>
    <ol type="1">
        <dl>
            <li>
                <dt>HTML</dt>
            </li>
            <dd>Hyper Text Markup Language</dd>
            <li>
                <dt>CSS</dt>
            </li>
            <dd>Cascading Style Sheet</dd>
            <li>
                <dt>JS</dt>
            </li>
            <dd>JavaScript</dd>
        </dl>
    </ol>

</body>

</html>
