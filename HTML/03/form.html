<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form action="https://www.google.com">

        <p>
            <label for="name">Enter your Name</label>

            <input type="text" placeholder="Enter your name" name="name" required />
        </p>

        <p>
            <label for="email">Enter your Email</label>

            <input type="email" placeholder="Enter your email" name="email" />
        </p>

        <p>
            <label for="password">Enter your Password</label>
            <input type="password" placeholder="Enter your password" name="password" />
        </p>

        <p>
            <label for="gender">Select your gender</label>

            <input type="radio" id="gmale" name="gender" value="Male" />
            <label for="gmale">Male</label>
            <input type="radio" id="gfemale" name="gender" value="Female" />
            <label for="gfemale">Female</label>

        </p>

        <p>
            <label for="study">Select your edcuation background</label>
            <br />
            <br />

            <input type="checkbox" name="studies" value="10th" id="g10" />
            <label for="g10">10th</label>

            <input type="checkbox" name="studies" value="Inter" id="ginter" />
            <label for="ginter">Inter</label>

            <input type="checkbox" name="studies" value="Diploma" id="gdiploma" />
            <label for="gdiploma">Diploma</label>

            <input type="checkbox" name="studies" value="Btech" id="gbtech" />
            <label for="gbtech">Btech</label>


        </p>

        <p>
            <label for="DOB">Date of Birth</label>
            <input type="date" name="date">
        </p>

        <p>
            <label for="city">City</label>
            <select name="city" id="city">
                <option value="">Select your city</option>
                <option value="Hyderabad">Hyderabad</option>
                <option value="Vishakapatanam">Vishkapatanam</option>
                <option value="Vijaywada">Vijaywada</option>
            </select>
        </p>
        <p>
            <input type="file">

        </p>

        <textarea name="" id=""></textarea>



        <button>submit</button>




    </form>



</body>

</html>
