<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <form action="./login.html">
        <justify-content: center>
            <h1>Registration Form</h1>
        <p>
            <label for="name">Enter your Name</label>

            <input type="text" placeholder="Enter your name" name="name" required />
        </p>

        <p>
            <label for="email">Enter your Email</label>

            <input type="email" placeholder="Enter your email" name="email" required />
        </p>

        <p>
            <label for="password">Enter your Password</label>
            <input type="password" placeholder="Enter your password" name="password" required />
        </p>

        <p>
            <label for="number">Enter your phone number</label>
            <input type="tel" placeholder="Enter your phone number" name="number" required />

        </p>
        <p>
            <label for="address">Enter your address</label>

            <textarea name="address" id="address" placeholder="Enter your address" required></textarea>

        </p>

        <p>
            <label for="gender">Select your gender</label>

            <input type="radio" id="gmale" name="gender" value="Male" required />
            <label for="gmale">Male</label>
            <input type="radio" id="gfemale" name="gender" value="Female" required />
            <label for="gfemale">Female</label>

        </p>
        <p>
            <label for="DOB">Date of Birth</label>
            <input type="date" name="date" required>
        </p>


        <p>

            <label for="profile"> Upload your image</label>
            <input type="file" id="profile" required>

        </p>

        <p>
            <label for="city">City</label>
            <select name="city" id="city" required>
                <option value="">Select your city</option>
                <option value="Hyderabad">Hyderabad</option>
                <option value="Vishakapatanam">Vishkapatanam</option>
                <option value="Vijaywada">Vijaywada</option>
            </select>
        </p>

        <p>
            <label for="study">Select your edcuation background</label>
            <br />
            <br />

            <input type="checkbox" name="studies" value="10th" id="g10" />
            <label for="g10">10th</label>

            <input type="checkbox" name="studies" value="Inter" id="ginter" />
            <label for="ginter">Inter</label>

            <input type="checkbox" name="studies" value="Diploma" id="gdiploma" />
            <label for="gdiploma">Diploma</label>

            <input type="checkbox" name="studies" value="Btech" id="gbtech" />
            <label for="gbtech">Btech</label>


        </p>








        <button>submit</button>




    </form>



</body>

</html>
