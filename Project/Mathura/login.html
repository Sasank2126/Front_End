<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: rgba(210, 224, 235);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh !important;

        }

        .parent {
            display: flex;
            width: 50%;
            background: white;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid #0f4c3a;

        }

        .login-part {
            width: 50%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            font-size: 60px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            color: #ec3107;
        }

        p {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            color: gray;
            margin: 4px;
        }

        input {
            width: 85%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .forget {
            display: flex;
            font-size: 12px;
            margin: 10px 0;
        }

        .forget a {
            text-decoration: none;
            color: red;
        }


        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .login-btn {

            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #0f4c3a;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            color: #054d4e
        }

        .create-btn {
            flex: 1;
            padding: 12px;
            background: white;
            border: 2px solid #0f4c3a;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            color: #054d4e
        }


        .image {
            width: 50%;
            position: relative;
        }
    </style>





</head>

<body>


    <div class="parent">

        <div class="login-part">
            <div class="logo">Mathura</div>

            <h2 style="margin: 0;">Welcome Back!</h2>
            <p>Please log in to your Account.</p>

            <form action="./Mathura.html">

                <label for="email">Enter your Email</label>
                <input type="email" placeholder="Enter your email" id="email" name="email" required />
                <label for="password">Enter your Password</label>
                <input type="password" placeholder="Enter your password" id="password" name="password" required />
                <div class="forget">
                   <a href="./forget.html">Forgot Password?</a>
                </div>

                <div class="buttons">
                    <button type="submit" class="login-btn">Login</button>

                    <a class="create-btn" href="./index.html">Create account</a>
                </div>

            </form>
        </div>

        <div class="image">
            <img src="https://png.pngtree.com/png-vector/20250803/ourmid/pngtree-adorable-chibi-radha-krishna-dancing-together-with-flowers-png-image_16821619.webp"
                alt="radha-krishna" />
        </div>

    </div>
</body>

</html>
